services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: bong
      POSTGRES_PASSWORD: bong
      POSTGRES_DB: bong
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bong"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://bong:bong@db:5432/bong?schema=public"
      APP_DOMAIN: "localhost:3000"
      PORT: "3000"
      ENCRYPTION_KEY: "${ENCRYPTION_KEY}"
    volumes:
      - ./templates:/app/templates
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
